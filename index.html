<!DOCTYPE html>
<html>
<head>
  <title>Memory Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Memory Card Game</h1>
  
<div id="instructions">
  <p>Click Begin Game to start.</p>
  <p>Watch the cards, then click in order: 2 → 3 → … → Ace.</p>
  <p>2 wins = add a card. 2 mistakes = lose a card.</p>
</div>

<button id="beginBtn">Begin Game</button>
<button id="resetBtn">Reset Game</button>

<div id="score"></div>
<div id="game"></div>

<script src="script.js"></script>
</body>
</html>
